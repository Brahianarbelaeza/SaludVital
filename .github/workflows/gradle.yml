name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    # Ejecución explícita de tests antes del build
    - name: Run Tests
      run: ./gradlew test

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    - name: Build Docker image
      run: docker build -t vitalapp:latest .
      
    - name: Login to Docker Hub
      run: echo "${{ secrets.VITALAPP_TOKEN_DOCKERHUB }}" | docker login -u "${{ secrets.VITALAPP_NAME_DOCKERHUB }}" --password-stdin

    - name: Tag Docker image
      run: docker tag vitalapp:latest ${{ secrets.VITALAPP_NAME_DOCKERHUB }}/vitalapp:latest

    - name: Push Docker image to Docker Hub
      run: docker push ${{ secrets.VITALAPP_NAME_DOCKERHUB }}/vitalapp:latest


  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

